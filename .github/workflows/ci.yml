name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-blog

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: my-blog/package-lock.json

      - name: Install dependencies
        run: npm ci --include=optional

      # Workaround for npm optional dependency resolution on Linux runners.
      - name: Ensure Rollup Linux binary is present
        run: npm install --no-save @rollup/rollup-linux-x64-gnu

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --watch=false

      - name: Build
        run: npm run build
